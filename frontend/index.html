<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ERP Ração - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">ERP Ração</span>
      <button class="btn btn-outline-light" id="logoutBtn">Sair</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2>Dashboard</h2>
    <p>Bem-vindo ao ERP da Casa de Ração!</p>
    <div class="row">
      <div class="col-md-4">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="card-title">Produtos</h5>
          <p class="card-text">Gerencie cadastro e estoque de produtos.</p>
          <a href="pages/produtos.html" class="btn btn-primary">Acessar</a>
        </div>
      </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center">
          <div class="card-body">
            <h5 class="card-title">Clientes</h5>
            <p class="card-text">Gerencie o cadastro de clientes.</p>
            <a href="pages/cadastros.html#clientes" class="btn btn-primary">Acessar</a>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center">
          <div class="card-body">
            <h5 class="card-title">Vendas</h5>
            <p class="card-text">Controle o PDV e caixa.</p>
            <a href="pages/pdv.html" class="btn btn-primary">Acessar</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
