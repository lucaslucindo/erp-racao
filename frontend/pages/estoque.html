<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ERP Ração - Estoque</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">ERP Ração - Estoque</span>
      <button class="btn btn-outline-light" id="logoutBtn">Sair</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2>Controle de Estoque</h2>

    <!-- Botão para nova movimentação -->
    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#movimentacaoModal">
      Nova Movimentação
    </button>

    <!-- Tabela de movimentações -->
    <table class="table table-striped" id="movimentacoesTable">
      <thead>
        <tr>
          <th>Data</th>
          <th>Produto</th>
          <th>Quantidade</th>
          <th>Tipo</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- Gráfico de movimentações -->
    <h4 class="mt-4">Resumo de Movimentações</h4>
    <canvas id="estoqueChart" height="100"></canvas>
  </div>

  <!-- Modal de movimentação -->
  <div class="modal fade" id="movimentacaoModal" tabindex="-1">
    <div class="modal-dialog">
      <form class="modal-content" id="movimentacaoForm">
        <div class="modal-header"><h5 class="modal-title">Nova Movimentação</h5></div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="produto" class="form-label">Produto</label>
            <input type="text" class="form-control" id="produto" required>
          </div>
          <div class="mb-3">
            <label for="quantidade" class="form-label">Quantidade</label>
            <input type="number" class="form-control" id="quantidade" required>
          </div>
          <div class="mb-3">
            <label for="tipo" class="form-label">Tipo</label>
            <select class="form-select" id="tipo" required>
              <option value="entrada">Entrada</option>
              <option value="saida">Saída</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
            <!-- Botão Cancelar -->
            <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
            <!-- Botão Salvar -->
            <button type="submit" class="btn btn-success">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/estoque.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
