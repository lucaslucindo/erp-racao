<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ERP Ração - Produtos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">ERP Ração - Produtos</span>
      <button class="btn btn-outline-light" id="logoutBtn">Sair</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2>Gerenciamento de Produtos</h2>

    <!-- Botão para novo produto -->
    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#produtoModal">
      Novo Produto
    </button>

    <!-- Tabela de produtos -->
    <table class="table table-striped" id="produtosTable">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Preço</th>
          <th>Estoque</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- Gráfico de estoque -->
    <h4 class="mt-4">Resumo de Estoque</h4>
    <canvas id="estoqueChart" height="100"></canvas>
  </div>

  <!-- Modal de produto -->
  <div class="modal fade" id="produtoModal" tabindex="-1">
    <div class="modal-dialog">
      <form class="modal-content" id="produtoForm">
        <div class="modal-header"><h5 class="modal-title">Novo Produto</h5></div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="nome" class="form-label">Nome<span style="color:red">*</span></label>
            <input type="text" class="form-control" id="nome" required>
          </div>
          <div class="mb-3">
            <label for="preco" class="form-label">Preço<span style="color:red">*</span></label>
            <input type="number" class="form-control" id="preco" required>
          </div>
          <div class="mb-3">
            <label for="estoque" class="form-label">Estoque Inicial<span style="color:red">*</span></label>
            <input type="number" class="form-control" id="estoque" required>
          </div>
          <div class="mb-3">
            <label for="categoria" class="form-label">Categoria<span style="color:red">*</span></label>
            <input type="text" class="form-control" id="categoria" required>
          </div>
            <div class="mb-3">
            <label for="custo" class="form-label">Custo<span style="color:red">*</span></label>
            <input type="number" class="form-control" id="custo" required>
          </div>
            <div class="mb-3">
            <label for="min_stock" class="form-label">Estoque Mínimo<span style="color:red">*</span></label>
            <input type="number" class="form-control" id="min_stock" required>
        </div>          
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-success">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de edição de produto -->
  <div class="modal fade" id="editarProdutoModal" tabindex="-1">
    <div class="modal-dialog">
      <form class="modal-content" id="editarProdutoForm">
        <div class="modal-header"><h5 class="modal-title">Editar Produto</h5></div>
        <div class="modal-body">
          <input type="hidden" id="editId">
          <div class="mb-3">
            <label for="editNome" class="form-label">Nome</label>
            <input type="text" class="form-control" id="editNome" required>
          </div>
          <div class="mb-3">
            <label for="editCategoria" class="form-label">Categoria</label>
            <input type="text" class="form-control" id="editCategoria" required>
          </div>
          <div class="mb-3">
            <label for="editCusto" class="form-label">Custo</label>
            <input type="number" class="form-control" id="editCusto" required>
          </div>
          <div class="mb-3">
            <label for="editPreco" class="form-label">Preço</label>
            <input type="number" class="form-control" id="editPreco" required>
          </div>
          <div class="mb-3">
            <label for="editEstoque" class="form-label">Estoque</label>
            <input type="number" class="form-control" id="editEstoque" required>
          </div>
          <div class="mb-3">
            <label for="editMinStock" class="form-label">Estoque Mínimo</label>
            <input type="number" class="form-control" id="editMinStock" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-success">Salvar Alterações</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de exclusão de produto -->
  <div class="modal fade" id="excluirProdutoModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Excluir Produto</h5></div>
        <div class="modal-body">
          <p>Tem certeza que deseja excluir este produto?</p>
          <input type="hidden" id="deleteId">
          <p><strong id="deleteNome"></strong></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="position-fixed top-0 end-0 p-3" style="z-index: 1100">
    <div id="toastContainer"></div>
  </div>

  <script src="../js/produtos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
